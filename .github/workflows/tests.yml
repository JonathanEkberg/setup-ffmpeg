name: Tests

on:
  push:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  verify-build:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify dist/ is in sync with src/
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is stale. Run 'pnpm build' locally and commit the result."
            exit 1
          fi

  install-pinned:
    # End-to-end positive test: a version that IS in KNOWN_HASHES installs
    # cleanly and the binaries run.
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v3
      - uses: ./
        with:
          ffmpeg-version: '7.0.2'
      - run: ffmpeg -version
      - run: ffprobe -version

  refuse-unpinned:
    # Negative tests: each entry requests a target that is NOT in KNOWN_HASHES.
    # Strict mode must refuse the install. The job passes when refusal happens.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 2

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ffmpeg-version: '5.1.1'
            label: linux-version-not-in-registry
          - os: ubuntu-latest
            ffmpeg-version: 'git'
            label: linux-alias-git
          - os: ubuntu-latest
            ffmpeg-version: '7.0.2'
            architecture: arm64
            label: linux-arm64-not-pinned
          - os: windows-latest
            ffmpeg-version: '7.0.2'
            label: windows-no-pins
          - os: macos-latest
            ffmpeg-version: '7.0.2'
            architecture: x64
            label: darwin-no-pins

    steps:
      - uses: actions/checkout@v3
      - id: install
        uses: ./
        with:
          ffmpeg-version: ${{ matrix.ffmpeg-version }}
          architecture: ${{ matrix.architecture }}
        continue-on-error: true
      - name: Assert install was refused
        env:
          LABEL: ${{ matrix.label }}
          OUTCOME: ${{ steps.install.outcome }}
        if: steps.install.outcome != 'failure'
        run: |
          echo "::error::Expected install to fail ($LABEL) but step outcome was '$OUTCOME'"
          exit 1
